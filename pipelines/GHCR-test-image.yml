trigger: none
pr: none

pool:
  name: SelfHosted

variables:
- group: github-actions-runner-azure-pipelines-agent

steps:
- checkout: self

- task: PowerShell@2
  displayName: Build and push test image to GHCR
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      docker --version
      docker info

      Write-Host "Logging in to GHCR..."
      docker login ghcr.io -u "$(GHCR_USERNAME)" -p "$env:GHCR_TOKEN"
      if ($LASTEXITCODE -ne 0) { throw "GHCR login failed" }

      Write-Host "Building test image..."
      docker build -t "$(GHCR_IMAGE):test" .
      if ($LASTEXITCODE -ne 0) { throw "Docker build failed" }

      Write-Host "Pushing test image..."
      docker push "$(GHCR_IMAGE):test"
      if ($LASTEXITCODE -ne 0) { throw "Docker push failed" }

      docker logout ghcr.io

      Write-Host "Published test image: $(GHCR_IMAGE):test"
  env:
    GHCR_TOKEN: $(GHCR_TOKEN)

- task: PowerShell@2
  displayName: Publish dev branch to public GitHub repo
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      if ("$(Build.SourceBranch)" -ne "refs/heads/dev") {
        throw "Dev publishing must be run from dev only. Current branch: $(Build.SourceBranch)"
      }

      git config user.name "goldngroup-release-bot"
      git config user.email "release-bot@goldngroup.local"

      $githubUrl = "https://$env:GITHUB_TOKEN@github.com/$(GITHUB_REPO).git"

      if (git remote | Select-String "^github$") {
        git remote set-url github $githubUrl
      } else {
        git remote add github $githubUrl
      }

      git push github HEAD:dev --force

      Write-Host "Published ADO dev to GitHub dev: $(GITHUB_REPO)"
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)