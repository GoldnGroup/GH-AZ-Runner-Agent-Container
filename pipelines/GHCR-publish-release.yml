trigger: none

pr: none

name: v0.1.$(Rev:r)

pool:
  name: SelfHosted

variables:
- group: github-actions-runner-azure-pipelines-agent

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0

- task: PowerShell@2
  displayName: Validate release branch
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      if ("$(Build.SourceBranch)" -ne "refs/heads/main") {
        throw "Release publishing must be run from main only. Current branch: $(Build.SourceBranch)"
      }

      Write-Host "Release branch validation passed."

- task: PowerShell@2
  displayName: Build and push production image to GHCR
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      $version = "$(Build.BuildNumber)"

      docker --version
      docker info

      Write-Host "Logging in to GHCR..."
      docker login ghcr.io -u "$(GHCR_USERNAME)" -p "$env:GHCR_TOKEN"
      if ($LASTEXITCODE -ne 0) { throw "GHCR login failed" }

      Write-Host "Building production image..."
      docker build `
        -t "$(GHCR_IMAGE):latest" `
        -t "$(GHCR_IMAGE):$version" `
        .
      if ($LASTEXITCODE -ne 0) { throw "Docker build failed" }

      Write-Host "Pushing latest..."
      docker push "$(GHCR_IMAGE):latest"
      if ($LASTEXITCODE -ne 0) { throw "Docker push latest failed" }

      Write-Host "Pushing version tag..."
      docker push "$(GHCR_IMAGE):$version"
      if ($LASTEXITCODE -ne 0) { throw "Docker push version failed" }

      docker logout ghcr.io

      Write-Host "Published production images:"
      Write-Host "$(GHCR_IMAGE):latest"
      Write-Host "$(GHCR_IMAGE):$version"
  env:
    GHCR_TOKEN: $(GHCR_TOKEN)

- task: PowerShell@2
  displayName: Publish source to public GitHub repo
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      $version = "$(Build.BuildNumber)"

      git config user.name "goldngroup-release-bot"
      git config user.email "release-bot@goldngroup.local"

      $githubUrl = "https://$env:GITHUB_TOKEN@github.com/$(GITHUB_REPO).git"

      if (git remote | Select-String "^github$") {
        git remote set-url github $githubUrl
      } else {
        git remote add github $githubUrl
      }

      git fetch origin main
      git push github HEAD:main --force

      git tag -f "$version"
      git push github "$version" --force

      Write-Host "Published source to GitHub: $(GITHUB_REPO)"
      Write-Host "Published Git tag: $version"
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)

- task: PowerShell@2
  displayName: Publish Unraid template files to ADO templates repo
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      $org = "goldngroup"
      $project = "Code-Storage"
      $templatesRepo = "Unraid-Templates"

      $sourceXml = "$(Build.SourcesDirectory)/unraid/github-azure-ci-runner-agent.xml"
      $sourceIcon = "$(Build.SourcesDirectory)/unraid/icon.png"

      if (!(Test-Path $sourceXml)) {
        throw "Template XML not found: $sourceXml"
      }

      if (!(Test-Path $sourceIcon)) {
        throw "Icon not found: $sourceIcon"
      }

      $workDir = "$(Agent.TempDirectory)/unraid-templates-publish"

      if (Test-Path $workDir) {
        Remove-Item -Recurse -Force $workDir
      }

      git config --global user.name "goldngroup-release-bot"
      git config --global user.email "release-bot@goldngroup.local"

      $encodedPat = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$env:ADO_PAT"))
      $repoUrl = "https://dev.azure.com/$org/$project/_git/$templatesRepo"

      Write-Host "Cloning ADO templates repo..."
      git -c http.extraHeader="Authorization: Basic $encodedPat" clone $repoUrl $workDir

      Copy-Item $sourceXml "$workDir/github-azure-ci-runner-agent.xml" -Force
      Copy-Item $sourceIcon "$workDir/icon.png" -Force

      Set-Location $workDir

      git add github-azure-ci-runner-agent.xml icon.png

      $changes = git status --porcelain

      if ([string]::IsNullOrWhiteSpace($changes)) {
        Write-Host "No Unraid template changes to publish."
        exit 0
      }

      git commit -m "Update GitHub Azure CI Runner Agent template"

      Write-Host "Pushing template files to ADO templates repo..."
      git -c http.extraHeader="Authorization: Basic $encodedPat" push origin HEAD:main

      Write-Host "Published Unraid template files to ADO repo: $templatesRepo"
  env:
    ADO_PAT: $(ADO_PAT)