trigger:
  branches:
    include:
      - main

pr: none

pool:
  name: SelfHosted

variables:
- group: dockerhub-unraid-cicd-runner

steps:
- checkout: self

- task: PowerShell@2
  displayName: Build and push Docker image to Docker Hub
  inputs:
    targetType: inline
    script: |
      $ErrorActionPreference = "Stop"

      docker --version
      docker info

      Write-Host "DockerHub username from pipeline: '$(DOCKERHUB_USERNAME)'"
      Write-Host "DockerHub image from pipeline: '$(DOCKERHUB_IMAGE)'"
      Write-Host "DockerHub token length: $($env:DOCKERHUB_TOKEN.Length)"
      
      $bytes = [System.Text.Encoding]::UTF8.GetBytes($env:DOCKERHUB_TOKEN)
      $hash = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
      $hashString = [BitConverter]::ToString($hash).Replace("-", "").ToLower()
      Write-Host "DockerHub token SHA256: $hashString"

      Write-Host "Logging in to Docker Hub..."
      docker login -u "$(DOCKERHUB_USERNAME)" -p "$env:DOCKERHUB_TOKEN"
      if ($LASTEXITCODE -ne 0) { throw "Docker login failed" }

      Write-Host "Building Docker image..."
      docker build -t "$(DOCKERHUB_IMAGE):latest" .
      if ($LASTEXITCODE -ne 0) { throw "Docker build failed" }

      Write-Host "Pushing Docker image..."
      docker push "$(DOCKERHUB_IMAGE):latest"
      if ($LASTEXITCODE -ne 0) { throw "Docker push failed" }

      docker logout

      Write-Host "Docker image published: $(DOCKERHUB_IMAGE):latest"
  env:
    DOCKERHUB_TOKEN: $(DOCKERHUB_TOKEN)